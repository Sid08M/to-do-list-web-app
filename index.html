<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
</head>
<body>
    <div class="container">
        <h1>My To-Do List</h1>

        <div class="input-section">
            <input 
                type="text" 
                id="todoInput" 
                placeholder="Enter your to-do task..."
                autocomplete="off"
            >
            <button id="addBtn"onclick="addTask()">Add Task</button>
        </div>

        <div class="delete-section">
            <button id="deleteStartBtn" onclick="deleteTaskFromStart()">Delete from Start</button>
            <button id="deleteEndBtn" onclick="deleteTaskFromEnd()">Delete from End</button>
        </div>

        <div class="list-title">Your Tasks:</div>
        <div id="todoList" class="todo-list">
            <div class="empty-message">No tasks yet</div>
        </div>

        <div class="stats">
            <p>Total Tasks: <span id="taskCount">0</span></p>
        </div>
    </div>
    <script src="element.js"></script>
</body>
</html>
